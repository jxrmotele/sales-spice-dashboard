services:
  postgres:
    image: postgres:16-alpine
    container_name: coachview-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coachview
      POSTGRES_PASSWORD: coachview
      POSTGRES_DB: coachview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
